<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IRON HERO — Log</title>
  <script src="game.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style id="sharedStyles"></style>
  <style>
    .stats-strip { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:22px; }
    .stat-tile { background:var(--panel); border:1px solid var(--border); padding:16px; text-align:center; }
    .stat-tile-val { font-family:'Press Start 2P',monospace; font-size:.8rem; margin-bottom:6px; }
    .stat-tile-label { font-size:.6rem; color:var(--dim); text-transform:uppercase; letter-spacing:.1em; }
    .log-layout { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:20px; }
    .bw-form { display:flex; gap:10px; align-items:flex-end; margin-bottom:14px; flex-wrap:wrap; }
    .bw-form .field { flex:1; min-width:120px; }
    .bw-entries { display:flex; flex-direction:column; gap:5px; max-height:180px; overflow-y:auto; }
    .bw-entries::-webkit-scrollbar { width:3px; } .bw-entries::-webkit-scrollbar-thumb { background:var(--border); }
    .bw-row { display:flex; justify-content:space-between; align-items:center; padding:7px 11px; background:rgba(255,255,255,.02); border:1px solid var(--border); font-size:.7rem; }
    .bw-val { font-family:'Press Start 2P',monospace; font-size:.52rem; color:var(--hp); }
    .bw-del { background:none; border:none; color:var(--border); cursor:pointer; font-size:.8rem; transition:color .15s; }
    .bw-del:hover { color:var(--red); }
    .charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:20px; }
    .chart-card canvas { max-height:220px; }
    .log-controls { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
    .search-box { flex:1; min-width:180px; background:rgba(255,255,255,.03); border:1px solid var(--border); color:var(--white); font-family:'Exo 2',sans-serif; font-size:.82rem; padding:8px 12px; outline:none; transition:border-color .2s; }
    .search-box:focus { border-color:var(--accent); }
    .ex-cell { font-weight:700; color:var(--accent); }
    .wt-cell { font-family:'Press Start 2P',monospace; font-size:.5rem; color:var(--gold); }
    .pr-badge { font-family:'Press Start 2P',monospace; font-size:.42rem; color:var(--gold); }
    .del-btn { background:none; border:none; color:var(--border); cursor:pointer; font-size:.85rem; padding:2px 6px; transition:color .15s; }
    .del-btn:hover { color:var(--red); }
    .pr-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
    .pr-tile { background:var(--panel2); border:1px solid rgba(255,215,0,.15); padding:11px 13px; }
    .pr-tile-ex { font-size:.7rem; font-weight:700; color:var(--accent); margin-bottom:5px; }
    .pr-tile-wt { font-family:'Press Start 2P',monospace; font-size:.5rem; color:var(--gold); }
    .pr-tile-sub { font-size:.6rem; color:var(--dim); margin-top:3px; }
    @media(max-width:720px) { .stats-strip,.log-layout,.charts-grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>
<div id="navMount"></div>
<div class="page">
  <div class="page-header">
    <h1>📜 WORKOUT LOG</h1>
    <p>Your full training history — every session, every PR, every stat tracked.</p>
  </div>
  <div id="miniCharMount"></div>
  <div class="stats-strip" id="statsStrip"></div>

  <div class="log-layout">
    <div class="card end">
      <div class="card-title">▸ BODY WEIGHT TRACKER</div>
      <div class="bw-form">
        <div class="field"><label>Weight (lbs)</label><input id="bwInput" type="number" placeholder="185" min="50" step=".5"></div>
        <div class="field"><label>Date</label><input id="bwDate" type="date"></div>
        <button class="btn btn-ghost" onclick="logBodyWeight()" style="padding:9px 14px;font-size:.4rem;">+ LOG</button>
      </div>
      <div class="bw-entries" id="bwEntries"><div class="empty-state" style="padding:16px">No entries yet.</div></div>
    </div>
    <div class="card str chart-card">
      <div class="card-title">▸ STATS GROWTH</div>
      <canvas id="statsChart"></canvas>
    </div>
  </div>

  <div class="charts-grid">
    <div class="card xp chart-card">
      <div class="card-title">▸ XP PER SESSION</div>
      <canvas id="xpChart"></canvas>
    </div>
    <div class="card gold chart-card">
      <div class="card-title">▸ BODY WEIGHT OVER TIME</div>
      <canvas id="bwChart"></canvas>
    </div>
  </div>

  <div class="card xp" style="margin-bottom:20px;">
    <div class="card-title">▸ PERSONAL RECORDS</div>
    <div class="pr-grid" id="prGrid"><div class="empty-state">No PRs yet.</div></div>
  </div>

  <div class="card accent">
    <div class="card-title">▸ ALL SESSIONS</div>
    <div class="log-controls">
      <input class="search-box" id="searchBox" type="text" placeholder="Filter by exercise..." oninput="renderHistory()">
      <button class="btn btn-danger" onclick="clearAll()">🗑 CLEAR ALL</button>
    </div>
    <div id="historyWrap"><div class="empty-state">No workouts yet.</div></div>
  </div>
</div>

<div class="ach-popup" id="achPopup">
  <div class="ach-label">🏆 ACHIEVEMENT</div>
  <div class="ach-title" id="achTitle"></div>
  <div class="ach-desc"  id="achDesc"></div>
</div>

<script>
document.getElementById('sharedStyles').textContent  = SHARED_CSS;
document.getElementById('navMount').innerHTML        = navHTML('log.html');
document.getElementById('miniCharMount').innerHTML   = miniCharHTML();
document.getElementById('bwDate').value = new Date().toISOString().split('T')[0];

let G = loadState();
rebuildSkillBonuses(G);
renderMiniChar(G);

let _statsChart=null, _xpChart=null, _bwChart=null;

function renderStatsStrip() {
  const w=G.workouts;
  const tiles=[
    {val:w.length,                             label:'Sessions',   color:'var(--accent)'},
    {val:w.reduce((a,x)=>a+x.sets,0),          label:'Total Sets', color:'var(--str)'},
    {val:Object.keys(G.prs).length,            label:'PRs Set',    color:'var(--gold)'},
    {val:(G.hero.totalXP||0).toLocaleString(), label:'Total XP',   color:'var(--xp)'},
  ];
  document.getElementById('statsStrip').innerHTML=tiles.map(t=>`
    <div class="stat-tile" style="border-top:2px solid ${t.color}">
      <div class="stat-tile-val" style="color:${t.color}">${t.val}</div>
      <div class="stat-tile-label">${t.label}</div>
    </div>`).join('');
}

function logBodyWeight() {
  const val=parseFloat(document.getElementById('bwInput').value);
  const date=document.getElementById('bwDate').value;
  if(!val||!date) return;
  G.bodyWeightLog=G.bodyWeightLog.filter(e=>e.date!==date);
  G.bodyWeightLog.push({date,weight:val});
  G.bodyWeightLog.sort((a,b)=>a.date.localeCompare(b.date));
  const newAch=checkAchievements(G);
  saveState(G);
  newAch.forEach(a=>showAch(a.name,a.desc,a.icon));
  renderBWEntries(); buildBWChart();
}

function renderBWEntries() {
  const el=document.getElementById('bwEntries');
  const entries=[...G.bodyWeightLog].reverse();
  if(!entries.length){el.innerHTML='<div class="empty-state" style="padding:16px">No entries yet.</div>';return;}
  el.innerHTML=entries.map(e=>`
    <div class="bw-row">
      <span style="color:var(--dim);font-size:.65rem">${new Date(e.date+'T12:00').toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'})}</span>
      <span class="bw-val">${e.weight} lbs</span>
      <button class="bw-del" onclick="deleteBW('${e.date}')">✕</button>
    </div>`).join('');
}

function deleteBW(date) {
  G.bodyWeightLog=G.bodyWeightLog.filter(e=>e.date!==date);
  saveState(G); renderBWEntries(); buildBWChart();
}

const CHART_OPT = {
  responsive:true, maintainAspectRatio:true,
  plugins:{legend:{labels:{color:'#3a4070',font:{size:10}}}},
  scales:{
    x:{ticks:{color:'#3a4070',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}},
    y:{ticks:{color:'#3a4070',font:{size:10}},grid:{color:'rgba(255,255,255,.06)'}},
  }
};

function buildStatsChart() {
  const ctx=document.getElementById('statsChart').getContext('2d');
  if(_statsChart) _statsChart.destroy();
  const sessions=[...G.workouts].reverse().slice(0,15);
  if(!sessions.length) return;
  let str=0,end=0,agi=0,pow=0;
  const labels=[],strD=[],endD=[],agiD=[],powD=[];
  sessions.forEach((w,i)=>{
    str+=w.statGains?.str||0;end+=w.statGains?.end||0;agi+=w.statGains?.agi||0;pow+=w.statGains?.pow||0;
    labels.push('S'+(i+1));strD.push(str);endD.push(end);agiD.push(agi);powD.push(pow);
  });
  _statsChart=new Chart(ctx,{type:'line',data:{labels,datasets:[
    {label:'STR',data:strD,borderColor:'#ff5722',backgroundColor:'rgba(255,87,34,.1)',tension:.4,pointRadius:3},
    {label:'END',data:endD,borderColor:'#00bcd4',backgroundColor:'rgba(0,188,212,.1)',tension:.4,pointRadius:3},
    {label:'AGI',data:agiD,borderColor:'#cddc39',backgroundColor:'rgba(205,220,57,.1)',tension:.4,pointRadius:3},
    {label:'PWR',data:powD,borderColor:'#e040fb',backgroundColor:'rgba(224,64,251,.1)',tension:.4,pointRadius:3},
  ]},options:CHART_OPT});
}

function buildXPChart() {
  const ctx=document.getElementById('xpChart').getContext('2d');
  if(_xpChart) _xpChart.destroy();
  const sessions=[...G.workouts].reverse().slice(0,20);
  if(!sessions.length) return;
  _xpChart=new Chart(ctx,{type:'bar',data:{
    labels:sessions.map((_,i)=>'S'+(i+1)),
    datasets:[{label:'XP',data:sessions.map(w=>w.xpGained||0),backgroundColor:'rgba(170,0,255,.5)',borderColor:'#aa00ff',borderWidth:1}]
  },options:CHART_OPT});
}

function buildBWChart() {
  const ctx=document.getElementById('bwChart').getContext('2d');
  if(_bwChart) _bwChart.destroy();
  if(!G.bodyWeightLog.length) return;
  const entries=G.bodyWeightLog.slice(-20);
  _bwChart=new Chart(ctx,{type:'line',data:{
    labels:entries.map(e=>new Date(e.date+'T12:00').toLocaleDateString([],{month:'short',day:'numeric'})),
    datasets:[{label:'Weight (lbs)',data:entries.map(e=>e.weight),borderColor:'#00e676',backgroundColor:'rgba(0,230,118,.1)',tension:.4,pointRadius:4}]
  },options:CHART_OPT});
}

function renderPRs() {
  const grid=document.getElementById('prGrid'), prs=Object.entries(G.prs);
  if(!prs.length){grid.innerHTML='<div class="empty-state">No PRs yet.</div>';return;}
  grid.innerHTML=prs.sort((a,b)=>b[1].weight-a[1].weight).map(([ex,pr])=>`
    <div class="pr-tile">
      <div class="pr-tile-ex">${ex}</div>
      <div class="pr-tile-wt">★ ${pr.weight} lbs</div>
      <div class="pr-tile-sub">${pr.reps} reps · ${pr.date}</div>
    </div>`).join('');
}

function renderHistory() {
  const wrap=document.getElementById('historyWrap');
  const filter=(document.getElementById('searchBox').value||'').toLowerCase().trim();
  let rows=G.workouts;
  if(filter) rows=rows.filter(w=>w.exercise.toLowerCase().includes(filter));
  if(!rows.length){wrap.innerHTML=`<div class="empty-state">${filter?`No workouts match "${filter}"`:'No workouts yet.'}</div>`;return;}
  wrap.innerHTML=`<table><thead><tr>
    <th>Exercise</th><th>Weight</th><th>Volume</th><th>XP</th><th>Gains</th><th>PR</th><th>Date</th><th></th>
  </tr></thead><tbody>${rows.map(w=>`<tr>
    <td class="ex-cell">${w.exercise}</td>
    <td class="wt-cell">${w.weight>0?w.weight+' lbs':'—'}</td>
    <td>${w.sets} × ${w.reps}</td>
    <td><span style="color:var(--xp);font-size:.62rem">+${w.xpGained}</span></td>
    <td style="font-size:.6rem;color:var(--dim)">💪${w.statGains?.str||0} 🛡${w.statGains?.end||0} ⚡${w.statGains?.agi||0} 🔥${w.statGains?.pow||0}</td>
    <td>${w.isPR&&w.weight>0?'<span class="pr-badge">★ PR</span>':''}</td>
    <td style="font-size:.6rem;color:var(--dim)">${w.date} ${w.time||''}</td>
    <td><button class="del-btn" onclick="delWorkout(${w.id})">✕</button></td>
  </tr>`).join('')}</tbody></table>`;
}

function delWorkout(id) {
  G.workouts=G.workouts.filter(w=>w.id!==id); saveState(G);
  renderStatsStrip(); renderHistory(); buildXPChart(); buildStatsChart();
}

function clearAll() {
  if(!confirm('Delete ALL workout history? Cannot be undone.')) return;
  G.workouts=[]; G.prs={}; saveState(G);
  renderStatsStrip(); renderPRs(); renderHistory(); buildXPChart(); buildStatsChart();
}

renderStatsStrip(); renderPRs(); renderHistory(); renderBWEntries();
buildStatsChart(); buildXPChart(); buildBWChart();
</script>
</body>
</html>
